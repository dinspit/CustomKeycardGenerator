<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Генератор ключ-карт</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #13161c;
      --bg2:     #1a1e27;
      --bg3:     #1f2430;
      --surface: #242938;
      --border:  rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --red:     #d42b2b;
      --red-dim: rgba(212,43,43,0.15);
      --text:    #e8eaf0;
      --text2:   rgba(232,234,240,0.55);
      --text3:   rgba(232,234,240,0.3);
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
      --radius:  8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }

    /* ─── HEADER ─────────────────────────────────────── */
    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1.2rem;
      height: 58px;
    }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--red);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { width: 15px; height: 15px; fill: white; }
    .header-title { font-size: 0.95rem; font-weight: 600; }
    .header-sep { color: var(--text3); font-size: 0.8rem; }
    .header-sub { font-size: 0.78rem; color: var(--text2); }
    .header-right { margin-left: auto; font-family: var(--mono); font-size: 0.62rem; color: var(--text3); letter-spacing: 1px; }

    /* ─── LAYOUT ─────────────────────────────────────── */
    .app {
      max-width: 1280px;
      margin: 0 auto;
      padding: 1.5rem 2rem 3rem;
      display: grid;
      grid-template-columns: 370px 1fr;
      gap: 1.5rem;
      align-items: start;
    }
    .left-col { display: flex; flex-direction: column; gap: 1rem; }
    .right-col { display: flex; flex-direction: column; gap: 1rem; }

    /* ─── PANELS ─────────────────────────────────────── */
    .panel {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .panel-header {
      padding: 0.7rem 1.2rem;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .panel-header h2 {
      font-size: 0.72rem; font-weight: 600;
      letter-spacing: 0.8px; text-transform: uppercase; color: var(--text2);
    }
    .ph-dot { width: 6px; height: 6px; background: var(--red); border-radius: 50%; flex-shrink: 0; }
    .panel-body { padding: 1.1rem; }

    /* ─── FORM ───────────────────────────────────────── */
    .field { margin-bottom: 0.9rem; }
    .field:last-child { margin-bottom: 0; }
    label { display: block; font-size: 0.7rem; font-weight: 500; color: var(--text2); margin-bottom: 0.35rem; }
    input[type=text], input[type=number], select {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border2);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 0.8rem;
      padding: 0.52rem 0.72rem;
      outline: none;
      transition: border-color 0.15s;
      appearance: none;
    }
    input:focus, select:focus { border-color: var(--red); }
    select { cursor: pointer; }
    select option { background: var(--bg3); }

    /* ─── LEVELS ─────────────────────────────────────── */
    .levels-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.6rem; }
    .level-block label { font-size: 0.66rem; }
    .level-ctrl {
      display: flex; align-items: center;
      border: 1px solid var(--border2); border-radius: 5px;
      overflow: hidden; background: var(--bg3);
    }
    .lbtn {
      width: 30px; height: 32px; background: none; border: none;
      color: var(--text2); font-size: 1rem; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.12s; flex-shrink: 0;
    }
    .lbtn:hover { background: var(--surface); color: var(--text); }
    .lnum {
      flex: 1; text-align: center; font-family: var(--mono);
      font-size: 0.95rem; font-weight: 500; color: var(--red);
      background: transparent; border: none; outline: none; padding: 0;
    }

    /* ─── COLOR ──────────────────────────────────────── */
    .color-row { display: flex; gap: 0.5rem; align-items: center; }
    input[type=color] {
      width: 36px; height: 34px; padding: 2px 3px;
      border: 1px solid var(--border2); border-radius: 5px;
      background: var(--bg3); cursor: pointer; flex-shrink: 0;
    }
    .hex-input { flex: 1; }

    /* ─── STAGE ──────────────────────────────────────── */
    .stage {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 1.3rem;
      display: flex; flex-direction: column; align-items: center; gap: 1rem;
    }
    .stage-label {
      width: 100%; display: flex; justify-content: space-between;
      font-size: 0.65rem; font-family: var(--mono); color: var(--text3);
      padding-bottom: 0.75rem; border-bottom: 1px solid var(--border);
    }

    /* ─── CARD ───────────────────────────────────────── */
    .card-wrap {
      position: relative; width: 100%; max-width: 520px; user-select: none;
    }
    .card-base {
      width: 100%; display: block; border-radius: 10px;
      box-shadow: 0 6px 28px rgba(0,0,0,0.55);
    }

    /* ── Site02 / MetalCase: TOP stripe ── */
    .overlay-std .stripe {
      position: absolute; top: 0; left: 0; right: 0;
      height: 25%; border-radius: 10px 10px 0 0;
      pointer-events: none; transition: background 0.3s;
    }
    .overlay-std .card-name {
      position: absolute; top: 5%; left: 3.5%; right: 60%;
      font-family: var(--sans); font-size: clamp(0.42rem,1.15vw,0.74rem);
      font-weight: 600; color: #fff; text-transform: uppercase;
      letter-spacing: 0.4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-shadow: 0 1px 3px rgba(0,0,0,0.4); pointer-events: none;
    }
    .overlay-std .card-dept {
      position: absolute; top: 14.5%; left: 3.5%; right: 60%;
      font-family: var(--mono); font-size: clamp(0.3rem,0.75vw,0.5rem);
      color: rgba(255,255,255,0.8); white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; pointer-events: none;
    }
    /* pips positioned over the 3x3 squares on the card image */
    .overlay-std .pips {
      position: absolute;
      top: 28%; left: 2.2%; width: 50%; height: 69%;
      display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
      gap: 2.8%; pointer-events: none;
    }

    /* ── Management: LEFT stripe ── */
    .overlay-mgmt .stripe {
      position: absolute; top: 0; left: 0; bottom: 0;
      width: 21%; border-radius: 10px 0 0 10px;
      pointer-events: none; transition: background 0.3s;
    }
    .overlay-mgmt .card-name {
      position: absolute; top: 3.5%; left: 23%; right: 4%;
      font-family: var(--sans); font-size: clamp(0.4rem,1.1vw,0.7rem);
      font-weight: 600; color: #111; text-transform: uppercase;
      letter-spacing: 0.4px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; pointer-events: none;
    }
    /* pips: center-right area of management card */
    .overlay-mgmt .pips {
      position: absolute;
      top: 42%; left: 23%; width: 57%; height: 52%;
      display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
      gap: 3.5%; pointer-events: none;
    }

    /* ── Task Force: FULL TINT ── */
    .overlay-tf .tint {
      position: absolute; inset: 0; border-radius: 10px;
      mix-blend-mode: multiply; opacity: 0.4;
      transition: background 0.3s; pointer-events: none;
    }
    .overlay-tf .card-name {
      position: absolute; top: 6%; left: 11%; right: 52%;
      font-family: var(--sans); font-size: clamp(0.4rem,1.1vw,0.7rem);
      font-weight: 600; color: #1a1a1a; text-transform: uppercase;
      letter-spacing: 0.4px; white-space: nowrap; overflow: hidden;
      text-overflow: ellipsis; pointer-events: none;
    }
    /* pips left side of TF card */
    .overlay-tf .pips {
      position: absolute;
      top: 30%; left: 4.5%; width: 44%; height: 65%;
      display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
      gap: 5%; pointer-events: none;
    }

    /* pip cell */
    .pip {
      border-radius: 16%;
      background: transparent;
      border: 1.5px solid rgba(0,0,0,0.12);
      transition: background 0.22s, box-shadow 0.22s;
    }
    .pip.lit { border-color: rgba(255,255,255,0.25); }

    /* ─── LEGEND ─────────────────────────────────────── */
    .legend { display: flex; gap: 1rem; font-size: 0.67rem; color: var(--text2); font-family: var(--mono); }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; }
    .ldot { width: 8px; height: 8px; border-radius: 2px; }

    /* ─── COMMAND ────────────────────────────────────── */
    .cmd-box {
      background: #0c0f14; border: 1px solid var(--border2); border-radius: 6px;
      padding: 0.85rem 1rem; font-family: var(--mono); font-size: 0.76rem;
      color: #6be875; line-height: 1.5; word-break: break-all; min-height: 54px;
    }
    .cmd-box::before { content: '> '; color: var(--red); }
    .btn-row { display: flex; gap: 0.6rem; margin-top: 0.75rem; }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.52rem 1.1rem; border: none; border-radius: 5px;
      font-family: var(--sans); font-size: 0.76rem; font-weight: 500;
      cursor: pointer; transition: all 0.15s; letter-spacing: 0.2px;
    }
    .btn-red { background: var(--red); color: #fff; }
    .btn-red:hover { background: #e03232; }
    .btn-ok { background: #1a4d27; border: 1px solid #2a7a3c; color: #6be875; }

    /* ─── PRESETS ────────────────────────────────────── */
    .presets-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(155px,1fr)); gap: 0.45rem; }
    .preset {
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.65rem 0.75rem 0.65rem 1rem;
      cursor: pointer; transition: all 0.14s; position: relative; overflow: hidden;
    }
    .preset::before {
      content: ''; position: absolute; left: 0; top: 0; bottom: 0;
      width: 3px; background: var(--pc, var(--red));
    }
    .preset:hover { border-color: var(--pc, var(--red)); background: var(--surface); }
    .preset-name { font-size: 0.78rem; font-weight: 600; margin-bottom: 0.18rem; }
    .preset-info { font-size: 0.62rem; color: var(--text2); font-family: var(--mono); line-height: 1.4; }
    .preset-pips { display: flex; gap: 3px; margin-top: 0.3rem; flex-wrap: wrap; }
    .pp { width: 8px; height: 8px; border-radius: 2px; background: rgba(255,255,255,0.1); }
    .pp.on { background: var(--pp-c, #fff); }

    @media (max-width: 1050px) { .app { grid-template-columns: 1fr; } }
    @media (max-width: 600px) {
      .app { padding: 1rem; }
      .levels-row { grid-template-columns: 1fr; }
      .presets-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-mark">
    <svg viewBox="0 0 20 20"><path d="M10 1L3 5.5v9L10 19l7-4.5v-9L10 1zm0 2.2l5.3 3.4v6.8L10 16.8 4.7 13.4V6.6L10 3.2z"/></svg>
  </div>
  <span class="header-title">Генератор ключ-карт</span>
  <span class="header-sep">/</span>
  <span class="header-sub">AmSerg Games</span>
  <span class="header-right">CKRP v1.0</span>
</header>

<div class="app">

  <!-- ═══ ЛЕВАЯ КОЛОНКА ═══════════════════════════════ -->
  <div class="left-col">

    <div class="panel">
      <div class="panel-header"><div class="ph-dot"></div><h2>Параметры карты</h2></div>
      <div class="panel-body">
        <div class="field">
          <label>ID игрока</label>
          <input type="text" id="cardId" value="0" placeholder="Steam / Player ID">
        </div>
        <div class="field">
          <label>Имя карты (в инвентаре)</label>
          <input type="text" id="keycardName" value="Ключ-Карта_Логиста" placeholder="Ключ-Карта_Логиста">
        </div>
        <div class="field">
          <label>Департамент</label>
          <input type="text" id="department" value="LOGISTICS_DEPARTMENT" placeholder="LOGISTICS_DEPARTMENT">
        </div>
        <div class="field">
          <label>Роль / Должность</label>
          <input type="text" id="position" value="Логист" placeholder="Логист или %Role%">
        </div>
        <div class="field">
          <label>Тип карты</label>
          <select id="cardType">
            <option value="KeycardCustomSite02">Стандартная карта (Site-02)</option>
            <option value="KeycardCustomMetalCase">Карта в металлическом кейсе</option>
            <option value="KeycardCustomTaskForce">Карта оперативника (Task Force)</option>
            <option value="KeycardCustomManagement">Управленческая карта (Management)</option>
          </select>
        </div>
        <div class="field">
          <label>Цвет карты</label>
          <div class="color-row">
            <input type="color" id="cardColor" value="#528198">
            <input type="text" id="colorHex" class="hex-input" value="#528198" maxlength="7" placeholder="#RRGGBB">
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="ph-dot"></div><h2>Уровни доступа</h2></div>
      <div class="panel-body">
        <div class="levels-row">
          <div class="level-block">
            <label>Содержание</label>
            <div class="level-ctrl">
              <button class="lbtn" id="minusCon">−</button>
              <input class="lnum" type="number" id="conLvl" min="0" max="3" value="0">
              <button class="lbtn" id="plusCon">+</button>
            </div>
          </div>
          <div class="level-block">
            <label>Администр.</label>
            <div class="level-ctrl">
              <button class="lbtn" id="minusAdm">−</button>
              <input class="lnum" type="number" id="admLvl" min="0" max="3" value="0">
              <button class="lbtn" id="plusAdm">+</button>
            </div>
          </div>
          <div class="level-block">
            <label>Оружейная</label>
            <div class="level-ctrl">
              <button class="lbtn" id="minusArm">−</button>
              <input class="lnum" type="number" id="armLvl" min="0" max="3" value="0">
              <button class="lbtn" id="plusArm">+</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="ph-dot"></div><h2>Команда</h2></div>
      <div class="panel-body">
        <div class="cmd-box" id="cmdOut"></div>
        <div class="btn-row">
          <button class="btn btn-red" id="copyBtn">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3z"/></svg>
            Скопировать
          </button>
        </div>
      </div>
    </div>

  </div>

  <!-- ═══ ПРАВАЯ КОЛОНКА ══════════════════════════════ -->
  <div class="right-col">

    <div class="stage">
      <div class="stage-label">
        <span>ПРЕДПРОСМОТР</span>
        <span id="stageLabel">SITE-02 / СТАНДАРТНАЯ</span>
      </div>
      <div class="card-wrap" id="cardWrap"></div>
      <div class="legend">
        <div class="legend-item"><div class="ldot" style="background:#c0181a"></div>Содержание</div>
        <div class="legend-item"><div class="ldot" style="background:#d4aa4a"></div>Администр.</div>
        <div class="legend-item"><div class="ldot" style="background:#4a8ed4"></div>Оружейная</div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-header"><div class="ph-dot"></div><h2>Шаблоны</h2></div>
      <div class="panel-body">
        <div class="presets-grid" id="presetsGrid"></div>
      </div>
    </div>

  </div>
</div>

<script>
const IMAGES = {
  KeycardCustomSite02:     'Keycard_CustomSite02.png',
  KeycardCustomMetalCase:  'Keycard_CustomSite02.png',
  KeycardCustomTaskForce:  'Keycard_Operative.png',
  KeycardCustomManagement: 'Custom_Managment.png',
};
const TYPE_LABELS = {
  KeycardCustomSite02:     'SITE-02 / СТАНДАРТНАЯ',
  KeycardCustomMetalCase:  'METAL CASE / КЕЙС',
  KeycardCustomTaskForce:  'TASK FORCE / ОПЕРАТИВНИК',
  KeycardCustomManagement: 'MANAGEMENT / УПРАВЛЕНИЕ',
};
// Row order: 0=Containment, 1=Admin, 2=Armory  (matches plugin code level display)
const ROW_COLORS = ['#c0181a', '#d4aa4a', '#4a8ed4'];

const PRESETS = [
  { name:'Директор участка',  dept:'ADMINISTRATION',         pos:'Директор_Участка',   type:'KeycardCustomMetalCase',  color:'#960030', con:3,adm:3,arm:3 },
  { name:'Рук. исследований', dept:'SCIENTIFIC_DEPARTMENT',  pos:'Руководитель',       type:'KeycardCustomMetalCase',  color:'#d4a020', con:3,adm:3,arm:1 },
  { name:'Ст. научный сотр.', dept:'SCIENTIFIC_DEPARTMENT',  pos:'Ст._Науч._Сотр.',    type:'KeycardCustomSite02',     color:'#d4a020', con:3,adm:1,arm:0 },
  { name:'Научный сотрудник', dept:'SCIENTIFIC_DEPARTMENT',  pos:'Научный_Сотрудник',  type:'KeycardCustomSite02',     color:'#d4a020', con:2,adm:1,arm:0 },
  { name:'Куратор SCP',       dept:'SCIENTIFIC_DEPARTMENT',  pos:'Куратор_SCP-000',    type:'KeycardCustomSite02',     color:'#d4a020', con:3,adm:1,arm:2 },
  { name:'Командир МОГ',      dept:'MTF_DIVISION',           pos:'Командир_МОГ',       type:'KeycardCustomTaskForce',  color:'#1e3a8a', con:3,adm:3,arm:3 },
  { name:'Оперативник МОГ',   dept:'MTF_DIVISION',           pos:'Оперативник_МОГ',    type:'KeycardCustomTaskForce',  color:'#1e3a8a', con:2,adm:1,arm:2 },
  { name:'Нач. охраны',       dept:'SECURITY_DEPARTMENT',    pos:'Нач._Охраны',        type:'KeycardCustomSite02',     color:'#4a6741', con:2,adm:2,arm:3 },
  { name:'Охранник',          dept:'SECURITY_DEPARTMENT',    pos:'Охранник',           type:'KeycardCustomSite02',     color:'#4a6741', con:1,adm:0,arm:2 },
  { name:'Инженер',           dept:'ENGINEERING_&_TECH',     pos:'Инженер',            type:'KeycardCustomSite02',     color:'#00ad76', con:3,adm:1,arm:0 },
  { name:'IT-специалист',     dept:'ENGINEERING_&_TECH',     pos:'IT-Специалист',      type:'KeycardCustomSite02',     color:'#00ad76', con:2,adm:1,arm:0 },
  { name:'Логист',            dept:'LOGISTICS_DEPARTMENT',   pos:'Логист',             type:'KeycardCustomSite02',     color:'#0048ad', con:1,adm:0,arm:0 },
  { name:'Менеджер',          dept:'MANAGEMENT',             pos:'Менеджер',           type:'KeycardCustomManagement', color:'#6b21a8', con:2,adm:3,arm:1 },
];

const $ = id => document.getElementById(id);
const clamp = (v,a,b) => Math.min(b,Math.max(a,isNaN(v)?0:v));
const validHex = h => /^#[0-9a-fA-F]{6}$/.test(h);
const escHtml = s => s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const fmt = s => s.replace(/ /g,'_');

// steppers
function stepper(el, minId, plusId) {
  $(minId).onclick = () => { el.value=clamp(+el.value-1,0,3); update(); };
  $(plusId).onclick = () => { el.value=clamp(+el.value+1,0,3); update(); };
  el.addEventListener('input', update);
}
stepper($('conLvl'),'minusCon','plusCon');
stepper($('admLvl'),'minusAdm','plusAdm');
stepper($('armLvl'),'minusArm','plusArm');

const cardColor = $('cardColor');
const colorHex  = $('colorHex');
cardColor.addEventListener('input', () => { colorHex.value=cardColor.value; update(); });
colorHex.addEventListener('input', () => { if(validHex(colorHex.value)) cardColor.value=colorHex.value; update(); });
['cardId','keycardName','department','position','cardType'].forEach(id => $(id).addEventListener('input', update));
$('department').addEventListener('input', () => { $('department').value = $('department').value.toUpperCase(); });

// ── build pips html (row-major: 3 rows × 3 cols) ────────────────────────────
function buildPips(levels) {
  // levels[0]=containment, levels[1]=admin, levels[2]=armory
  let h = '';
  for (let row=0; row<3; row++) {
    for (let col=0; col<3; col++) {
      const lit = col < levels[row];
      const c   = ROW_COLORS[row];
      h += lit
        ? `<div class="pip lit" style="background:${c};box-shadow:0 0 6px ${c}88"></div>`
        : `<div class="pip"></div>`;
    }
  }
  return h;
}

// ── render card preview ──────────────────────────────────────────────────────
function buildCard(type, color, name, deptVal, levels) {
  const src = IMAGES[type] || IMAGES.KeycardCustomSite02;
  const n   = escHtml(name.replace(/_/g,' '));
  const d   = escHtml(deptVal.replace(/_/g,' '));
  const p   = buildPips(levels);

  if (type === 'KeycardCustomTaskForce') {
    return `<img class="card-base" src="${src}" alt="карта">
    <div class="overlay-tf">
      <div class="tint" style="background:${color}"></div>
      <div class="card-name">${n}</div>
      <div class="pips">${p}</div>
    </div>`;
  }
  if (type === 'KeycardCustomManagement') {
    return `<img class="card-base" src="${src}" alt="карта">
    <div class="overlay-mgmt">
      <div class="stripe" style="background:${color}"></div>
      <div class="card-name">${n}</div>
      <div class="pips">${p}</div>
    </div>`;
  }
  // Site02 / MetalCase
  return `<img class="card-base" src="${src}" alt="карта">
  <div class="overlay-std">
    <div class="stripe" style="background:${color}"></div>
    <div class="card-name">${n}</div>
    <div class="card-dept">${d}</div>
    <div class="pips">${p}</div>
  </div>`;
}

// ── main update ──────────────────────────────────────────────────────────────
function update() {
  const type  = $('cardType').value;
  const name  = $('keycardName').value || 'Ключ-Карта';
  const deptV = $('department').value  || 'DEPARTMENT';
  const posV  = $('position').value    || 'Роль';
  const color = validHex(colorHex.value) ? colorHex.value : cardColor.value;
  const con   = clamp(+$('conLvl').value,0,3);
  const adm   = clamp(+$('admLvl').value,0,3);
  const arm   = clamp(+$('armLvl').value,0,3);
  const id    = $('cardId').value || '0';

  $('cmdOut').textContent =
    `ckrp add ${type} ${con} ${adm} ${arm} ${fmt(deptV)} ${fmt(posV)} ${color} ${fmt(name)} ${id}`;

  $('cardWrap').innerHTML = buildCard(type, color, name, deptV, [con, adm, arm]);
  $('stageLabel').textContent = TYPE_LABELS[type] || type;
}

// ── copy ─────────────────────────────────────────────────────────────────────
$('copyBtn').addEventListener('click', async () => {
  const text = $('cmdOut').textContent;
  try { await navigator.clipboard.writeText(text); }
  catch {
    const t=document.createElement('textarea');
    t.value=text; document.body.appendChild(t); t.select();
    document.execCommand('copy'); document.body.removeChild(t);
  }
  const btn=$('copyBtn');
  btn.textContent='✓  Скопировано!'; btn.className='btn btn-ok';
  setTimeout(()=>{
    btn.innerHTML=`<svg width="12" height="12" viewBox="0 0 16 16" fill="currentColor"><path d="M4 1.5H3a2 2 0 0 0-2 2V14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V3.5a2 2 0 0 0-2-2h-1v1h1a1 1 0 0 1 1 1V14a1 1 0 0 1-1 1H3a1 1 0 0 1-1-1V3.5a1 1 0 0 1 1-1h1v-1z"/><path d="M9.5 1a.5.5 0 0 1 .5.5v1a.5.5 0 0 1-.5.5h-3a.5.5 0 0 1-.5-.5v-1a.5.5 0 0 1 .5-.5h3z"/></svg> Скопировать`;
    btn.className='btn btn-red';
  }, 2000);
});

// ── presets ───────────────────────────────────────────────────────────────────
(function buildPresets() {
  const grid = $('presetsGrid');
  const mkPips = (lvl, col) => Array.from({length:3},(_,i)=>
    `<div class="pp${i<lvl?' on':''}" style="${i<lvl?`--pp-c:${col}`:''}"></div>`
  ).join('');

  PRESETS.forEach(p => {
    const el=document.createElement('div');
    el.className='preset';
    el.style.setProperty('--pc', p.color);
    el.innerHTML=`
      <div class="preset-name">${p.name}</div>
      <div class="preset-info">${p.dept.replace(/_/g,' ')}</div>
      <div class="preset-pips">
        ${mkPips(p.con,'#c0181a')}<div style="width:3px"></div>
        ${mkPips(p.adm,'#d4aa4a')}<div style="width:3px"></div>
        ${mkPips(p.arm,'#4a8ed4')}
      </div>`;
    el.addEventListener('click', ()=>{
      $('cardType').value    = p.type;
      $('keycardName').value = p.pos;
      $('department').value  = p.dept;
      $('position').value    = p.pos.replace(/_/g,' ');
      cardColor.value        = p.color;
      colorHex.value         = p.color;
      $('conLvl').value      = p.con;
      $('admLvl').value      = p.adm;
      $('armLvl').value      = p.arm;
      update();
    });
    grid.appendChild(el);
  });
})();

update();
</script>
